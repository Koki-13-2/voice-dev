<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Dev</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* ============================================================
     Voice Dev — Design System v2
     音声ファーストの開発コンパニオン / ダークガラスUI
     ============================================================ */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 背景階層 */
    --bg: #05070c;
    --surface: #0f1522;
    --surface-2: #151d2e;
    --surface2: #151d2e;
    --glass: rgba(13, 18, 30, 0.82);

    /* 境界 */
    --border: #1e2635;
    --border-strong: #2e3b52;

    /* 文字階層 */
    --text: #e3e9f3;
    --text-strong: #f4f7fc;
    --muted: #93a0b4;
    --muted-2: #5c6b82;

    /* アクセント */
    --accent: #5b9dff;
    --accent-deep: #3d7dff;
    --violet: #8f6fff;
    --grad-accent: linear-gradient(135deg, #4c8dff 0%, #7c5cff 100%);
    --grad-accent-soft: linear-gradient(135deg, rgba(76,141,255,.14), rgba(124,92,255,.14));

    /* セマンティック */
    --green: #3fd68a;
    --red: #ff5d5d;
    --yellow: #e3b341;
    --orange: #ff9254;

    /* モード色 */
    --mode-idea: #b98aff;
    --mode-dev: #5b9dff;
    --mode-plan: #e3b341;
    --mode-propose: #ff9254;

    /* バブル */
    --user-bubble: linear-gradient(135deg, #2f6fed 0%, #5b4fd8 100%);
    --ai-bubble: #10182a;

    /* 形状・影 */
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
    --shadow-1: 0 1px 2px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
    --shadow-2: 0 4px 14px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
    --shadow-3: 0 12px 40px rgba(0,0,0,.55);
    --glow-accent: 0 0 0 1px rgba(91,157,255,.35), 0 0 18px rgba(91,157,255,.18);

    /* フォント */
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;

    /* レイアウト: 本文の最大幅（デスクトップで中央寄せ） */
    --content-pad: max(16px, calc((100% - 840px) / 2));
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background:
      radial-gradient(1100px 500px at 12% -8%, rgba(76, 141, 255, 0.09), transparent 60%),
      radial-gradient(900px 460px at 105% 108%, rgba(146, 92, 255, 0.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: rgba(91,157,255,.35); }

  /* スリムスクロールバー */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #263248; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #334360; }
  * { scrollbar-width: thin; scrollbar-color: #263248 transparent; }

  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ============ ヘッダー ============ */
  header {
    background: var(--glass);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    backdrop-filter: blur(18px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  header::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(91,157,255,.35), rgba(143,111,255,.35), transparent);
    pointer-events: none;
  }

  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .header-title { font-weight: 600; font-size: 16px; }

  /* ブランドマーク（接続状態ドットを右下に統合） */
  .brand {
    position: relative;
    width: 36px; height: 36px;
    border-radius: 11px;
    background: var(--grad-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(76,141,255,.35), inset 0 1px 0 rgba(255,255,255,.25);
    user-select: none;
  }
  .brand-logo { filter: drop-shadow(0 1px 1px rgba(0,0,0,.4)); }

  .status-dot {
    position: absolute;
    right: -2px; bottom: -2px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--red);
    border: 2px solid var(--bg);
    transition: background .3s, box-shadow .3s;
  }
  .status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 8px rgba(63,214,138,.7);
  }

  .header-controls { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  /* 狭い画面: ヘッダーを2段にしてモード切替を全幅表示 */
  @media (max-width: 640px) {
    header { flex-wrap: wrap; row-gap: 9px; }
    .header-left { display: contents; }
    .brand { order: 1; }
    .header-controls { order: 2; margin-left: auto; }
    .mode-toggle { order: 3; width: 100%; }
    .mode-btn { flex: 1; text-align: center; padding: 7px 4px; }
  }

  /* ============ モード切替（セグメントコントロール） ============ */
  .mode-toggle {
    display: flex;
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3px;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .mode-toggle::-webkit-scrollbar { display: none; }

  .mode-btn {
    background: none;
    border: none;
    border-radius: 9px;
    color: var(--muted-2);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 11px;
    cursor: pointer;
    transition: background .18s, color .18s, box-shadow .18s;
    white-space: nowrap;
    line-height: 1;
  }
  .mode-btn:hover { color: var(--muted); }

  .mode-btn.active {
    background: var(--surface-2);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 1px 4px rgba(0,0,0,.4);
  }
  .mode-btn.idea.active {
    color: var(--mode-idea);
    background: rgba(185,138,255,.13);
    box-shadow: inset 0 0 0 1px rgba(185,138,255,.32), 0 0 12px rgba(185,138,255,.12);
  }
  .mode-btn.dev.active {
    color: var(--mode-dev);
    background: rgba(91,157,255,.13);
    box-shadow: inset 0 0 0 1px rgba(91,157,255,.32), 0 0 12px rgba(91,157,255,.12);
  }
  .mode-btn.plan.active {
    color: var(--mode-plan);
    background: rgba(227,179,65,.12);
    box-shadow: inset 0 0 0 1px rgba(227,179,65,.32), 0 0 12px rgba(227,179,65,.10);
  }
  .mode-btn.propose.active {
    color: var(--mode-propose);
    background: rgba(255,146,84,.12);
    box-shadow: inset 0 0 0 1px rgba(255,146,84,.32), 0 0 12px rgba(255,146,84,.10);
  }

  /* ============ ヘッダー内コントロール ============ */
  #model-select {
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 9px;
    padding: 6px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    max-width: 108px;
    transition: border-color .15s, color .15s;
    appearance: none;
    -webkit-appearance: none;
  }
  #model-select:hover { border-color: var(--border-strong); color: var(--text); }

  #reset-btn, #tts-btn {
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 9px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    line-height: 1.2;
    transition: border-color .15s, color .15s, background .15s;
  }
  #reset-btn:hover, #tts-btn:hover { border-color: var(--border-strong); color: var(--text); }
  #tts-btn.off { opacity: 0.4; }

  /* ============ 会話エリア ============ */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px var(--content-pad) 22px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px) scale(.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message {
    max-width: 86%;
    padding: 11px 15px;
    border-radius: var(--r-lg);
    line-height: 1.6;
    word-break: break-word;
    animation: msgIn .28s cubic-bezier(.21,1.02,.55,1) both;
  }

  .message.user {
    background: var(--user-bubble);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    box-shadow: 0 3px 14px rgba(47,111,237,.32), inset 0 1px 0 rgba(255,255,255,.16);
  }

  .message.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-1);
  }

  .message.error {
    background: rgba(255,93,93,.08);
    border: 1px solid rgba(255,93,93,.45);
    align-self: flex-start;
    color: #ff8a8a;
    border-radius: var(--r-md);
  }

  /* ---- AIメッセージ内 Markdown ---- */
  .message.ai h1, .message.ai h2, .message.ai h3 {
    font-size: 1em; font-weight: 800; margin: 10px 0 5px;
    color: var(--text-strong);
  }
  .message.ai h2 { padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .message.ai p { margin: 5px 0; }
  .message.ai ul, .message.ai ol { padding-left: 20px; margin: 5px 0; }
  .message.ai li { margin: 3px 0; }
  .message.ai li::marker { color: var(--accent); }
  .message.ai code {
    background: rgba(91,157,255,.09);
    border: 1px solid rgba(91,157,255,.14);
    border-radius: 5px;
    padding: 1px 6px;
    font-size: 12.5px;
    font-family: var(--font-mono);
    color: #a8c7ff;
  }
  .message.ai pre {
    background: #070b14;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .message.ai pre code {
    background: none; border: none; padding: 0;
    color: #cdd9ec; font-size: 12.5px; line-height: 1.55;
  }
  .message.ai strong { color: var(--text-strong); }
  .message.ai a { color: var(--accent); text-underline-offset: 2px; }
  .message.ai blockquote {
    border-left: 3px solid var(--violet);
    background: rgba(143,111,255,.07);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    padding: 6px 12px;
    margin: 8px 0;
    color: var(--muted);
  }
  .message.ai table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 12.5px;
    width: 100%;
    display: block;
    overflow-x: auto;
  }
  .message.ai th {
    background: var(--surface-2);
    color: var(--text-strong);
    font-weight: 700;
    padding: 7px 11px;
    border: 1px solid var(--border-strong);
    text-align: left;
    white-space: nowrap;
  }
  .message.ai td { padding: 6px 11px; border: 1px solid var(--border); vertical-align: top; }
  .message.ai hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ============ ツール実行カード（ターミナル風） ============ */
  .tool-card {
    background: #070b14;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    margin: 2px 0;
    overflow: hidden;
    font-size: 13px;
    box-shadow: var(--shadow-1);
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(180deg, #121a29, #0e1521);
    border-bottom: 1px solid var(--border);
    color: var(--yellow);
    font-family: var(--font-mono);
    font-size: 12px;
    overflow: hidden;
    white-space: nowrap;
  }
  .tool-header::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 14px 0 0 rgba(63,214,138,.75), 28px 0 0 rgba(91,157,255,.75);
    margin-right: 26px;
    flex-shrink: 0;
  }
  .tool-header span { overflow: hidden; text-overflow: ellipsis; }

  .tool-result {
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 132px;
    overflow-y: auto;
    line-height: 1.5;
  }

  /* ============ 思考中インジケータ ============ */
  .thinking {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    border-bottom-left-radius: 6px;
    align-self: flex-start;
    position: relative;
    overflow: hidden;
    animation: msgIn .25s ease both;
  }
  .thinking::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(100deg, transparent 20%, rgba(91,157,255,.07) 50%, transparent 80%);
    background-size: 220% 100%;
    animation: thinkShimmer 2.2s linear infinite;
    pointer-events: none;
  }
  @keyframes thinkShimmer {
    from { background-position: 130% 0; }
    to   { background-position: -110% 0; }
  }

  .thinking-dots { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .thinking span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--grad-accent);
    animation: bounce 1.2s cubic-bezier(.36,.07,.19,.97) infinite;
    box-shadow: 0 0 8px rgba(91,157,255,.5);
  }
  .thinking span:nth-child(2) { animation-delay: .15s; }
  .thinking span:nth-child(3) { animation-delay: .3s; }

  .thinking-info { display: flex; flex-direction: column; gap: 2px; }
  .thinking-status { font-size: 13px; color: var(--text); font-weight: 600; }
  .thinking-timer {
    font-size: 11px; color: var(--muted-2);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-7px); }
  }

  /* ============ 入力エリア ============ */
  .input-area {
    background: var(--glass);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    backdrop-filter: blur(18px) saturate(1.4);
    border-top: 1px solid var(--border);
    padding: 12px var(--content-pad);
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .input-area::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(91,157,255,.3), rgba(143,111,255,.3), transparent);
    pointer-events: none;
  }

  .text-row { display: flex; gap: 8px; align-items: flex-end; }

  #text-input {
    flex: 1;
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 11px 15px;
    color: var(--text);
    font-size: 15px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    font-family: inherit;
    line-height: 1.45;
    transition: border-color .18s, box-shadow .18s;
  }
  #text-input::placeholder { color: var(--muted-2); }
  #text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,157,255,.14);
  }
  #text-input:disabled { opacity: .55; }

  #send-btn {
    background: var(--grad-accent);
    border: none;
    border-radius: var(--r-md);
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    color: #fff;
    box-shadow: 0 3px 12px rgba(76,141,255,.4), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .12s, box-shadow .15s, filter .15s;
  }
  #send-btn:hover { filter: brightness(1.1); }
  #send-btn:active { transform: scale(.94); }
  #send-btn:disabled {
    background: var(--surface-2);
    color: var(--muted-2);
    box-shadow: none;
    cursor: default;
    filter: none;
  }

  /* ============ マイクボタン（ヒーロー） ============ */
  #mic-btn {
    position: relative;
    width: 100%;
    height: 58px;
    border-radius: 29px;
    border: 1px solid var(--border-strong);
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0)),
      var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-1);
    transition: border-color .2s, box-shadow .25s, background .2s, transform .12s;
    animation: micBreath 4s ease-in-out infinite;
  }
  #mic-btn:hover { border-color: var(--accent); box-shadow: var(--glow-accent); }
  #mic-btn:active { transform: scale(.985); }

  @keyframes micBreath {
    0%, 100% { box-shadow: var(--shadow-1); }
    50% { box-shadow: 0 1px 2px rgba(0,0,0,.35), 0 0 16px rgba(91,157,255,.12); }
  }

  #mic-btn.listening {
    background: linear-gradient(135deg, rgba(255,93,93,.16), rgba(255,60,110,.12)), var(--surface);
    border-color: var(--red);
    color: #ff8a8a;
    animation: micPulse 1.4s ease-in-out infinite;
  }
  #mic-btn.listening::before,
  #mic-btn.listening::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    border: 1.5px solid rgba(255,93,93,.55);
    animation: micRipple 1.8s cubic-bezier(.22,.61,.36,1) infinite;
    pointer-events: none;
  }
  #mic-btn.listening::after { animation-delay: .9s; }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,93,93,.28); }
    50% { box-shadow: 0 0 22px 2px rgba(255,93,93,.22); }
  }
  @keyframes micRipple {
    from { transform: scale(1); opacity: .8; }
    to   { transform: scale(1.08, 1.55); opacity: 0; }
  }

  #mic-label { font-size: 15px; letter-spacing: .01em; }

  /* ============ クイックアクション ============ */
  .quick-actions {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 1px;
  }
  .quick-actions::-webkit-scrollbar { display: none; }

  .qa-btn {
    background: rgba(5,7,12,.55);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 13px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color .15s, color .15s, background .15s;
  }
  .qa-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(91,157,255,.08); }
  .qa-btn:active { transform: scale(.97); }

  /* ============ プロジェクト選択 ============ */
  .project-picker {
    align-self: stretch;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 10px 0;
    animation: msgIn .3s ease both;
  }

  .picker-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .workspace-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .workspace-btn {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,0)), var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    color: var(--text);
    padding: 26px 16px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: border-color .18s, transform .18s, box-shadow .18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-1);
  }
  .workspace-btn:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-2), var(--glow-accent);
  }
  .workspace-btn:active { transform: translateY(0) scale(.98); }
  .workspace-btn .ws-icon { font-size: 30px; }
  .workspace-btn .ws-icon-img {
    width: 52px; height: 52px;
    border-radius: 13px;

  /* ---- 新規ファイルフォーム ---- */

  .new-file-form input[type="text"] {

  .template-chip {

  /* ---- 検索 ---- */

  /* ============ 提案モード ============ */

  .proposal-row input[type=checkbox] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px; height: 20px;

    background: rgba(5,7,12,.5);

    cursor: pointer;
    position: relative;
    transition: all .15s;

  .proposal-row input[type=checkbox]:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    font-weight: 900;
  }
  .proposal-row input[type=checkbox]:disabled { cursor: default; opacity: .5; }

  .proposal-angle {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 800;

    background: rgba(255,146,84,.1);

    padding: 2px 8px;

  .proposal-title { font-size: 13.5px; font-weight: 700; color: var(--text-strong); }

  /* ============ 自動開発バー ============ */
  .autodev-bar {
    background:
      radial-gradient(400px 80px at 8% 0%, rgba(227,179,65,.1), transparent 70%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),
      var(--surface);
    border: 1px solid rgba(227,179,65,.35);
    border-radius: var(--r-md);
    padding: 12px 15px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow-1);
  }

  .autodev-toggle {
    width: 48px; height: 27px;
    border-radius: 14px;
    background: #212b3f;
    border: 1px solid var(--border-strong);
    position: relative;
    cursor: pointer;
    transition: background .22s, border-color .22s, box-shadow .22s;
    flex-shrink: 0;
  }
  .autodev-toggle.on {
    background: linear-gradient(135deg, #2ea043, #238636);

    box-shadow: 0 0 14px rgba(46,160,67,.4);
  }
  .autodev-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 3px;
    width: 21px; height: 21px;

  }
  .autodev-toggle.on::after { left: 23px; }

  .autodev-info { font-size: 12.5px; color: var(--muted); flex: 1; min-width: 150px; line-height: 1.6; }
  .autodev-interval-select {
    background: rgba(5,7,12,.5); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 6px; font-size: 12px; cursor: pointer;
    outline: none;
  }
  .autodev-interval-select:focus { border-color: var(--accent); }

  /* ============ 秘密情報モーダル ============ */
  .secret-input {
    flex: 1;
    min-width: 0;
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .secret-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,157,255,.14); }

  /* ============ トースト ============ */
  .toast {
    position: fixed;
    bottom: calc(96px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--glass);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    white-space: nowrap;
    max-width: 92vw;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: var(--shadow-3);
    animation: toastSlide .25s cubic-bezier(.21,1.02,.55,1);
    pointer-events: none;
    transition: opacity .3s;
  }
  .toast.success { border-color: rgba(63,214,138,.55); color: var(--green); box-shadow: var(--shadow-3), 0 0 18px rgba(63,214,138,.12); }
  .toast.error   { border-color: rgba(255,93,93,.55); color: var(--red); box-shadow: var(--shadow-3), 0 0 18px rgba(255,93,93,.12); }
  .toast.info    { border-color: rgba(91,157,255,.55); color: var(--accent); box-shadow: var(--shadow-3), 0 0 18px rgba(91,157,255,.12); }

  @keyframes toastSlide {
    from { opacity: 0; transform: translateX(-50%) translateY(12px) scale(.97); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  /* ============ ボトムシート（モーダル） ============ */
  .fp-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,4,8,.65);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    animation: overlayIn .2s ease both;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .fp-sheet {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 640px;

    flex-direction: column;

  @keyframes fpSlideUp {
    from { transform: translateY(60%); opacity: .4; }
    to   { transform: translateY(0);   opacity: 1;  }
  }

  .sheet-handle {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--border-strong);
    margin: 10px auto 0;
    flex-shrink: 0;

  .fp-header {
    display: flex;
    align-items: center;

    display: flex; align-items: center; justify-content: center;

  .fp-close:hover { border-color: var(--red); color: var(--red); }
  .fp-close:active { transform: scale(.92); }

  .fp-search-row { position: relative; padding: 12px 14px 10px; flex-shrink: 0; }
  .fp-search-icon {
    position: absolute;
    left: 26px; top: 50%; transform: translateY(-50%);

  }
  .fp-search-input {

  .fp-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,157,255,.14); }

  .fp-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .fp-folder-header {
    padding: 7px 16px;
    font-size: 11px;
    font-weight: 800;

  .fp-file-check {
    width: 20px; height: 20px;

  .fp-file-row.selected .fp-file-check {

  .fp-file-info { min-width: 0; flex: 1; }
  .fp-file-name {
    font-size: 13px;

  .fp-empty {
    text-align: center;

  .fp-footer {
    display: flex;

    box-shadow: 0 3px 10px rgba(76,141,255,.35);

  }
  .fp-add-btn:hover { filter: brightness(1.1); }
  .fp-add-btn:active { transform: scale(.97); }
  .fp-add-btn:disabled {
    background: var(--surface-2);
    color: var(--muted-2);
    box-shadow: none;
    cursor: default;
  }

  /* ============ 添付ボタン ============ */
  #attach-btn {
    background: rgba(5,7,12,.6);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    width: 44px; height: 44px;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;

  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }

  /* ============ デスクトップ微調整 ============ */

    .workspace-grid { grid-template-columns: repeat(3, 1fr); }

</style>

<body>

<!-- ファイルピッカーモーダル -->
<div id="file-picker-overlay" class="fp-overlay" style="display:none" onclick="fpClickOverlay(event)">

<script>
// ---- モード管理 ----
let currentMode = localStorage.getItem('mode') || 'dev'; // 'idea' | 'dev' | 'plan' | 'propose'

function setModeButtons(mode) {
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.classList.contains(mode));
  });
}

function switchMode(mode) {
  currentMode = mode;
  localStorage.setItem('mode', mode);
  setModeButtons(mode);

  // セッションリセットして初期画面へ
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  goModeHome();
}

function goModeHome() {
  if (currentMode === 'idea') {
    showIdeaScreen();
  } else {
    showWorkspacePicker();
  }
}

// ---- 設定 ----
const HOST = location.host;
let selectedModel = localStorage.getItem('selectedModel') || 'claude-sonnet-4-6';

function saveModel() {
  selectedModel = document.getElementById('model-select').value;
  localStorage.setItem('selectedModel', selectedModel);
}

function generateId() {
  try { return crypto.randomUUID(); } catch(e) {}
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
const SESSION_ID = (() => {
  // localStorage を使用: ページリロード・タブ再開後も同じセッションIDを維持し、
  // 実行中タスクへの再接続を可能にする
  let id = sessionStorage.getItem('sessionId');
  if (!id) {
    id = localStorage.getItem('sessionId') || generateId();
    sessionStorage.setItem('sessionId', id);
    localStorage.setItem('sessionId', id);
  }
  return id;
})();
let projectPath = localStorage.getItem('projectPath') || '';

// ---- プロジェクト選択（2段階） ----
let _projectsCache = null;

async function loadProjects() {
  if (_projectsCache) return _projectsCache;
  try {
    _projectsCache = await fetch('/api/projects').then(r => r.json());
  } catch(e) {
    _projectsCache = [];
  }
  return _projectsCache;
}

const WS_ICONS = { 'private-dev': '🛠' };
const WS_IMG_CACHE = {};

async function getWsIcon(name) {
  if (WS_ICONS[name]) return `<span class="ws-icon">${WS_ICONS[name]}</span>`;
  if (WS_IMG_CACHE[name] !== undefined) return WS_IMG_CACHE[name];
  const res = await fetch(`/api/workspace-icon/${name}`, { method: 'HEAD' });
  const html = res.ok
    ? `<img class="ws-icon-img" src="/api/workspace-icon/${name}" alt="${name}">`
    : `<span class="ws-icon">📂</span>`;
  WS_IMG_CACHE[name] = html;
  return html;
}
const PROJ_ICONS = {
  'voice-dev': '🎙', 'stock-visualizer': '📈',
  'chart_app': '📊', 'slide_app': '🖥', 'util_aiapi': '🔧',
  'claw-code': '🦀',
};

const FOLDER_ICONS = {
  features: '⚡', screens: '🖥', api: '🔌',
  data: '🗄', flows: '🔄',
};

function renderFileRow(f) {
  return `<div class="plan-file-row">
    <div class="plan-file-info">
      <span class="plan-file-name">📄 ${escHtml(f.name)}</span>
      ${f.rel_path && f.rel_path !== f.name + '.md' ? `<span class="plan-file-meta">${escHtml(f.rel_path)}</span>` : ''}
    </div>
    <div class="plan-file-actions">
      <a class="plan-action-btn" href="/md-view?path=${encodeURIComponent(f.path)}" target="_blank">👁 閲覧</a>
      <button class="plan-action-btn" onclick="startPlanChat('${escAttr(f.path)}','${escAttr(f.name)}')">💬 チャット</button>
      <button class="plan-action-btn danger" onclick="deletePlanFile('${escAttr(f.path)}','${escAttr(f.name)}')" title="削除">🗑</button>
    </div>
  </div>`;
}

function setPicker(html) {
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'project-picker';
  el.id = 'project-picker';
  el.innerHTML = html;
  messagesEl.appendChild(el);
}

// Step1: ワークスペース選択
async function showWorkspacePicker() {
  const workspaces = await loadProjects();
  const icons = await Promise.all(workspaces.map(ws => getWsIcon(ws.workspace)));
  const btns = workspaces.map((ws, i) =>
    `<button class="workspace-btn" onclick="showProjectPicker('${ws.workspace}')">
      ${icons[i]}${ws.workspace}
    </button>`
  ).join('');
  setPicker(`
    <div class="picker-title">ワークスペースを選択</div>
    <div class="workspace-grid">${btns}</div>`);
  setInputEnabled(false);
}

// Step2: プロジェクト選択
async function showProjectPicker(wsName) {
  const workspaces = await loadProjects();
  const ws = workspaces.find(w => w.workspace === wsName);
  if (!ws) return;
  const iconHtml = await getWsIcon(wsName);
  const btns = ws.projects.map(p => {
    const picon = PROJ_ICONS[p.name] || '📁';
    return `<button class="project-btn" onclick="selectProject('${p.path}','${p.name}')">
      <span class="proj-icon">${picon}</span>${p.name}
    </button>`;
  }).join('');
  setPicker(`
    <button class="picker-back" onclick="showWorkspacePicker()">← ${iconHtml} ${wsName}</button>
    <div class="picker-title">プロジェクトを選択</div>
    <div class="project-list">
      ${btns}
      <button class="project-btn new-proj-btn" onclick="showNewProjectForm('${wsName}')">
        <span class="proj-icon">➕</span>新規プロジェクトを作成

async function createProject(wsName) {
  const name = document.getElementById('new-proj-name')?.value.trim();

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },

function selectProject(path, name) {

function removeContextFile(path) {

let fpAllFiles = [];
let fpSelectedPaths = new Set();
let fpCurrentQuery = '';

async function openFilePicker() {

function fpClickOverlay(e) {

function filterPickerFiles(q) {

function renderPickerList(files) {
  const list = document.getElementById('fp-list');
  if (!files.length) {
    list.innerHTML = '<div class="fp-empty">ファイルが見つかりません</div>';
    return;
  }

  // フォルダでグループ化
  const grouped = {};
  for (const f of files) {
    const folder = f.folder || '(ルート)';
    if (!grouped[folder]) grouped[folder] = [];
    grouped[folder].push(f);
  }

  let html = '';
  for (const [folder, ffiles] of Object.entries(grouped).sort()) {
    html += `<div class="fp-folder-header">📂 ${escHtml(folder)}</div>`;
    for (const f of ffiles) {
      const sel = fpSelectedPaths.has(f.path);
      html += `<div class="fp-file-row${sel ? ' selected' : ''}" onclick="togglePickerFile('${escAttr(f.path)}','${escAttr(f.name)}',this)">
        <div class="fp-file-check">${sel ? '✓' : ''}</div>
        <div class="fp-file-info">
          <div class="fp-file-name">${escHtml(f.name)}</div>
          ${f.folder ? `<div class="fp-file-path">${escHtml(f.rel_path)}</div>` : ''}
        </div>
      </div>`;
    }
  }
  list.innerHTML = html;

function togglePickerFile(path, name, rowEl) {
  if (fpSelectedPaths.has(path)) {
    fpSelectedPaths.delete(path);
    rowEl.classList.remove('selected');
    rowEl.querySelector('.fp-file-check').textContent = '';
  } else {
    fpSelectedPaths.add(path);

}

function updateFpFooter() {

  const fileMap = new Map(fpAllFiles.map(f => [f.path, f]));

async function showPlanScreen(projPath, projName) {

  let inner = `<div class="plan-screen-header">

function togglePlanFolder(key, bodyId, headerEl) {

// ── フォルダツリー構築 ──────────────────────────────

function buildFolderTree(files, folders) {
  const root = { name: '', path: '', children: {}, files: [] };

  // フォルダノードを確保（空フォルダも含む）
  for (const folder of folders) {
    const parts = folder.split('/').filter(Boolean);
    let node = root;
    let cur = '';
    for (const part of parts) {
      cur = cur ? `${cur}/${part}` : part;
      if (!node.children[part]) {
        node.children[part] = { name: part, path: cur, children: {}, files: [] };
      }
      node = node.children[part];
    }
  }

  // ファイルをツリーに配置
  for (const f of files) {
    if (!f.folder) {
      root.files.push(f);
    } else {
      const parts = f.folder.split('/').filter(Boolean);
      let node = root;
      let cur = '';
      for (const part of parts) {
        cur = cur ? `${cur}/${part}` : part;
        if (!node.children[part]) {
          node.children[part] = { name: part, path: cur, children: {}, files: [] };
        }
        node = node.children[part];
      }
      node.files.push(f);
    }
  }

  return root;
}

function countFolderFiles(node) {
  let count = node.files.length;
  for (const child of Object.values(node.children)) count += countFolderFiles(child);
  return count;
}

function renderFolderGroup(node, depth) {
  const folder = node.path;
  const isCollapsed = planFolderCollapsed[folder] === true;
  const bodyId = 'pfb-' + btoa(encodeURIComponent(folder)).replace(/[^a-zA-Z0-9]/g, '_');
  const topFolder = folder.split('/')[0];
  const folderIcon = FOLDER_ICONS[topFolder] || '📂';
  const totalFiles = countFolderFiles(node);
  const isNested = depth > 1;
  const paddingLeft = 12 + (depth - 1) * 16;

  const childEntries = Object.values(node.children).sort((a, b) => a.name.localeCompare(b.name));

  let html = `<div class="plan-folder-group${isNested ? ' plan-folder-nested' : ''}">
      <div class="plan-folder-header" style="padding-left:${paddingLeft}px" onclick="togglePlanFolder('${escAttr(folder)}','${bodyId}',this)">
        <div class="plan-folder-header-left">
          <span class="plan-folder-toggle">${isCollapsed ? '▶' : '▼'}</span>
          <span>${folderIcon} ${escHtml(node.name)}</span>
          <span class="plan-folder-count">${totalFiles}</span>
        </div>
        <button class="plan-folder-add-btn" onclick="event.stopPropagation();showNewFileForm('${escAttr(folder)}')">＋</button>
      </div>
      <div class="plan-folder-body${isCollapsed ? ' collapsed' : ''}" id="${bodyId}">`;

  // 子フォルダを再帰的にレンダリング
  for (const child of childEntries) {
    html += renderFolderGroup(child, depth + 1);
  }

  // ファイル
  if (node.files.length === 0 && childEntries.length === 0) {
    html += `<div class="plan-folder-empty">ファイルなし — ＋ で追加</div>`;
  }
  for (const f of node.files) html += renderFileRow(f);

  html += `</div></div>`;
  return html;
}

function selectPlanFolder(folder) {
  newFileSelectedFolder = folder;
  document.querySelectorAll('.folder-chips .folder-chip').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.folder-chips .folder-chip').forEach(el => {
    const isRoot = folder === '' && el.textContent.includes('ルート');
    const isMatch = folder !== '' && el.textContent.trim() === folder;
    if (isRoot || isMatch) el.classList.add('selected');
  });
  document.getElementById('nf-custom-area')?.classList.remove('visible');
  document.getElementById('nf-custom-toggle')?.classList.remove('selected');
  // テンプレートを自動提案
  const suggested = PLAN_KNOWN_TEMPLATES.find(t => folder.includes(t)) || newFileSelectedTemplate;
  if (suggested !== newFileSelectedTemplate) selectPlanTemplate(suggested);
  updatePlanPathPreview();
}

function toggleCustomFolder() {
  const area = document.getElementById('nf-custom-area');
  const btn = document.getElementById('nf-custom-toggle');
  const visible = area?.classList.toggle('visible');
  btn?.classList.toggle('selected', visible);
  if (visible) {
    document.getElementById('nf-custom-folder')?.focus();
  } else {
    newFileSelectedFolder = '';
    updatePlanPathPreview();
  }
}

function onCustomFolderInput(val) {
  newFileSelectedFolder = val.trim();
  document.querySelectorAll('.folder-chips .folder-chip:not(.new-folder-chip)').forEach(el => el.classList.remove('selected'));
  updatePlanPathPreview();
}

function selectPlanTemplate(key) {
  newFileSelectedTemplate = key;
  document.querySelectorAll('#nf-template-chips .template-chip').forEach((el, i) => {
    const keys = ['features', 'screens', 'api', 'data', 'flows', ''];
    el.classList.toggle('selected', keys[i] === key);
  });
}

function updatePlanPathPreview() {
  const raw = document.getElementById('nf-name')?.value.trim() || '';
  const fname = (raw || '...').replace(/\.md$/, '') + '.md';
  const folderPart = newFileSelectedFolder ? ' / ' + newFileSelectedFolder : '';
  const fp = document.getElementById('nf-preview-folder');
  const fn = document.getElementById('nf-preview-file');
  if (fp) fp.textContent = folderPart;
  if (fn) fn.textContent = fname;
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

async function createPlanFile() {
  const filename = document.getElementById('nf-name').value.trim();
  if (!filename) { showToast('ファイル名を入力してください', 'error'); return; }

  const btn = document.querySelector('#new-file-form .btn-create');
  if (btn) { btn.disabled = true; btn.textContent = '作成中...'; btn.classList.add('btn-loading'); }

  try {
    const res = await fetch('/api/plan/create-file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        project_path: currentPlanProjectPath,
        folder: newFileSelectedFolder,
        filename,
        template_category: newFileSelectedTemplate,
      }),
    }).then(r => r.json());

    if (res.error) throw new Error(res.error);
    showToast(`「${res.name}」を作成しました`, 'success');
    startPlanChat(res.path, res.name);
  } catch(e) {
    showToast('ファイルの作成に失敗しました: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '作成してチャット開始'; btn.classList.remove('btn-loading'); }
  }
}

function showToast(msg, type = 'info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; }, 2500);
  setTimeout(() => toast.remove(), 2800);
}

async function deletePlanFile(filePath, fileName) {
  if (!confirm(`「${fileName}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  try {
    const res = await fetch(`/api/plan/file?path=${encodeURIComponent(filePath)}`, {
      method: 'DELETE',
    }).then(r => r.json());
    if (res.error) throw new Error(res.error);
    showToast(`「${fileName}」を削除しました`, 'success');
    await showPlanScreen(currentPlanProjectPath, currentPlanProjectName);
  } catch(e) {
    showToast('削除に失敗しました: ' + e.message, 'error');
  }
}

function filterPlanFiles(query) {
  const q = query.toLowerCase().trim();
  let anyVisible = false;
  document.querySelectorAll('#plan-screen .plan-file-row').forEach(row => {
    const name = row.querySelector('.plan-file-name')?.textContent.toLowerCase() || '';
    const show = !q || name.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) anyVisible = true;
  });
  // フォルダ全体の表示制御（検索時に一致なしは非表示）
  document.querySelectorAll('#plan-screen .plan-folder-group').forEach(group => {
    if (!q) { group.style.display = ''; return; }
    const visible = [...group.querySelectorAll('.plan-file-row')].some(r => r.style.display !== 'none');
    group.style.display = visible ? '' : 'none';
  });
  // 結果なし表示
  let noResult = document.getElementById('plan-no-results');
  if (q && !anyVisible) {
    if (!noResult) {
      noResult = document.createElement('div');
      noResult.id = 'plan-no-results';
      noResult.className = 'plan-no-results';
      document.getElementById('plan-screen').appendChild(noResult);
    }
    noResult.textContent = `「${query}」に一致するファイルはありません`;
  } else if (noResult) {
    noResult.remove();
  }
}

function startPlanChat(filePath, fileName) {
  currentPlanFile = filePath;
  document.getElementById('plan-screen')?.remove();
  document.getElementById('new-file-form')?.remove();
  document.getElementById('messages').innerHTML = '';
  updatePlanFileBar();

  // 実装開始バーを表示
  const implBar = document.createElement('div');
  implBar.id = 'impl-start-bar';
  implBar.className = 'impl-bar';
  implBar.innerHTML = `
    <span class="impl-bar-label">📋 <strong>${escHtml(fileName)}</strong> の要件定義</span>
    <div class="impl-bar-actions">
      <button class="btn-impl" onclick="startImplementation('${filePath.replace(/'/g,"\\'")}','${fileName.replace(/'/g,"\\'")}');">
        🚀 実装開始
      </button>
      <button class="btn-impl-ghost" onclick="reviewRequirements('${filePath.replace(/'/g,"\\'")}','${fileName.replace(/'/g,"\\'")}');">
        📋 要件確認
      </button>

async function showProposalScreen(projPath, projName) {

  screen.className = 'plan-screen';
  screen.id = 'proposal-screen';

  const doneTasks = data.tasks.filter(t => t.done);

  let inner = `<div class="plan-screen-header">
    <span class="plan-screen-title">🔧 ${escHtml(projName)} 改善提案 <span class="plan-folder-count">${data.tasks.length}</span></span>

    inner += `<div class="plan-empty">提案がまだありません<br><small>「🤖 提案を生成」でAIがコードを解析して改善案を提案します</small></div>`;

  if (tasks.length > 1) {
    statusLine = `⚙ ${tasks.length}件 並行実行中: ` + tasks.map(t => `${escHtml(t.app)} #${t.id}（${escHtml(t.started)}〜）`).join('、');
  } else if (tasks.length === 1) {
    const t = tasks[0];
    statusLine = `⚙ 実行中: ${escHtml(t.app)} #${t.id} ${escHtml(t.title)}（${escHtml(t.started)}〜）`;
  } else if (ad.next_task) {
    statusLine = `次のタスク: ${escHtml(ad.next_task.app)} #${ad.next_task.id} ${escHtml(ad.next_task.title)}`;
  } else {
    statusLine = 'キューは空です（実装したい提案にチェックを入れてください）';
  }
  const intervalVal = ad.interval_min ?? 30;
  return `<button class="autodev-toggle${ad.enabled ? ' on' : ''}" onclick="toggleAutodev()" title="自動開発 ON/OFF"></button>
    <div class="autodev-info">
      <strong style="color:${ad.enabled ? '#3fb950' : '#8b949e'}">🤖 自動開発 ${ad.enabled ? 'ON' : 'OFF'}</strong>

// ---- WebSocket ----
let ws = null;
let wsReady = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${HOST}/ws/${SESSION_ID}`);

  ws.onopen = () => {
    wsReady = true;
    document.getElementById('status-dot').classList.add('connected');
  };

  ws.onclose = () => {
    wsReady = false;
    document.getElementById('status-dot').classList.remove('connected');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
}

// ---- サーバーメッセージ処理 ----
let currentAiDiv = null;
let thinkingDiv = null;
let thinkingTimerInterval = null;
let thinkingStartTime = null;

const THINKING_STAGES = [
  { sec: 0,  text: '考え中...' },
  { sec: 6,  text: '処理中...' },
  { sec: 12, text: '少し時間がかかっています...' },
  { sec: 25, text: 'もうすぐです...' },
  { sec: 40, text: 'まだ動いています、お待ちください...' },
];

function handleServerMessage(msg) {
  if (msg.type === 'thinking') {
    removeThinking();
    thinkingDiv = document.createElement('div');
    thinkingDiv.className = 'thinking';
    thinkingDiv.innerHTML = `
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <div class="thinking-info">
        <div class="thinking-status" id="thinking-status">考え中...</div>
        <div class="thinking-timer" id="thinking-timer">0秒経過</div>
      </div>`;
    document.getElementById('messages').appendChild(thinkingDiv);
    scrollBottom();
    currentAiDiv = null;

    setInputEnabled(false);
    thinkingStartTime = Date.now();
    thinkingTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - thinkingStartTime) / 1000);
      const timerEl = document.getElementById('thinking-timer');
      const statusEl = document.getElementById('thinking-status');
      if (timerEl) timerEl.textContent = elapsed + '秒経過';
      if (statusEl) {
        const stage = [...THINKING_STAGES].reverse().find(s => elapsed >= s.sec);
        if (stage) statusEl.textContent = stage.text;
      }
    }, 1000);

    return;
  }

  removeThinking();

  if (msg.type === 'text' || msg.type === 'result_text') {
    if (!currentAiDiv) {
      currentAiDiv = addMessage('ai', '');
      currentAiDiv._raw = '';
      currentAiDiv._renderPending = false;
    }
    currentAiDiv._raw += msg.content;
    if (!currentAiDiv._renderPending) {
      currentAiDiv._renderPending = true;
      const div = currentAiDiv;
      requestAnimationFrame(() => {
        div._renderPending = false;
        // ストリーム中は :::choices ブロックを一時的に非表示
        const { cleanText } = parseChoices(div._raw);
        div.innerHTML = marked.parse(cleanText || div._raw);
        scrollBottom();
      });
    }
  }

  if (msg.type === 'tool_start') {
    currentAiDiv = null;
    const card = document.createElement('div');
    card.className = 'message ai';
    card.style.padding = '0';
    card.innerHTML = `
      <div class="tool-card">
        <div class="tool-header">⚙ ${escHtml(msg.tool)}<span style="color:var(--muted);font-size:11px">${escHtml(JSON.stringify(msg.input))}</span></div>
        <div class="tool-result" id="tr-${escHtml(msg.tool)}-${Date.now()}">実行中...</div>
      </div>`;
    document.getElementById('messages').appendChild(card);
    card._resultEl = card.querySelector('.tool-result');
    card._toolName = msg.tool;
    scrollBottom();
    // 最後のtool cardを記録
    window._lastToolCard = card;
  }

  if (msg.type === 'tool_end' && window._lastToolCard) {
    window._lastToolCard._resultEl.textContent = msg.result;
    scrollBottom();
  }

  if (msg.type === 'idea_saved') {
    showToast(`要件定義書「${msg.idea.title}」を保存しました`, 'success');
    currentAiDiv = null;
    const div = document.createElement('div');
    div.className = 'message ai';
    div.innerHTML = `💡 <strong>${escHtml(msg.idea.title)}</strong> をアイデアDBに保存しました。
      <div class="idea-actions">
        <a class="plan-action-btn" href="/md-view?path=${encodeURIComponent(msg.idea.path)}" target="_blank">👁 閲覧</a>
        <button class="plan-action-btn" onclick="showIdeaScreen()">📚 アイデア一覧へ</button>
      </div>`;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  }

  if (msg.type === 'notice') {
    showToast(msg.content, 'info');
  }

  if (msg.type === 'proposals_updated') {
    if (msg.added > 0) {
      showToast(`${msg.added}件の提案を追加しました（${msg.parsed}件読み取り）`, 'success');
    } else if (msg.parsed > 0) {
      showToast(`${msg.parsed}件読み取りましたが、すべて既存提案と重複していました`, 'info');
    } else if (msg.cache_file) {
      showToast('提案を読み取れませんでした（リトライ済み）。生出力: ' + msg.cache_file, 'error');
    } else {
      showToast('新しい提案はありませんでした', 'success');
    }
    if (currentMode === 'propose' && projectPath === msg.app_path) {
      showProposalScreen(projectPath, projectPath.split('/').pop());
    }
  }

  if (msg.type === 'error') {
    addMessage('error', '⚠ ' + msg.content);
    setInputEnabled(true);
    scrollBottom();
  }

  if (msg.type === 'done') {
    if (currentAiDiv?._raw) {
      // :::choices ブロックを抽出してから最終レンダリング
      const { cleanText, choices } = parseChoices(currentAiDiv._raw);
      currentAiDiv.innerHTML = marked.parse(cleanText);
      scrollBottom();
      speak(cleanText);
      if (choices.length > 0) {
        renderChoiceButtons(choices);
      }
    }
    setInputEnabled(true);
    currentAiDiv = null;
    scrollBottom();
    if (isListening) {
      isProcessing = false;
      updateMicVisualListening();
    }
  }
}

function parseChoices(text) {
  const choicesRegex = /:::choices\s*\n([\s\S]*?)\n:::/g;
  const choices = [];
  const cleanText = text.replace(choicesRegex, (match, body) => {
    body.split('\n').forEach(line => {
      const item = line.replace(/^[-*]\s*/, '').trim();
      if (item) choices.push(item);
    });
    return '';
  }).trim();
  return { cleanText, choices };
}

function renderChoiceButtons(choices) {
  const block = document.createElement('div');
  block.className = 'choices-block';
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      // 全ボタンを無効化
      block.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
      send(choice);
    };
    block.appendChild(btn);
  });
  document.getElementById('messages').appendChild(block);
  scrollBottom();
}

function removeThinking() {
  if (thinkingTimerInterval) { clearInterval(thinkingTimerInterval); thinkingTimerInterval = null; }
  if (thinkingDiv) { thinkingDiv.remove(); thinkingDiv = null; }
}

// ---- TTS読み上げ ----
let ttsEnabled = true;
let speechUnlocked = false;

// iOS Safariはユーザー操作外からのspeakをブロックするため、
// 最初のユーザー操作で無音utteranceを発行してアンロックする
function unlockSpeech() {
  if (speechUnlocked || !window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance('');
  utt.volume = 0;
  window.speechSynthesis.speak(utt);
  speechUnlocked = true;
}

// AI応答から最後の散文段落だけを抽出する
function extractLastParagraph(text) {
  // コードブロック・インラインコード除去
  const noCode = text.replace(/```[\s\S]*?```/g, '').replace(/`[^`]+`/g, '');
  // Markdown記号・箇条書き除去
  const plain = noCode.replace(/#{1,6}\s*/g, '').replace(/[*_~>]/g, '')
    .replace(/^\s*[-•*]\s*/gm, '').replace(/^\s*\d+\.\s*/gm, '').trim();
  // 空行で段落分割し、10文字以上の段落だけ取得
  const paragraphs = plain.split(/\n{2,}/).map(p => p.replace(/\n/g, ' ').trim()).filter(p => p.length >= 10);
  return paragraphs[paragraphs.length - 1] || '';
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const lastParagraph = extractLastParagraph(text);
  if (!lastParagraph) return;
  const utt = new SpeechSynthesisUtterance(lastParagraph);
  utt.lang = 'ja-JP';
  utt.rate = 1.1;
  window.speechSynthesis.speak(utt);
}

// ---- メッセージ追加 ----
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'ai') {
    div.innerHTML = marked.parse(text);
  } else {
    div.innerText = text;
  }
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- 送信 ----
function send(text) {
  if (!text.trim()) return;
  // 要件定義モードはプロジェクト選択不要（アイデアDBに直接保存）
  if (currentMode !== 'idea' && !projectPath) {
    showWorkspacePicker();
    return;
  }
  if (!wsReady) {
    addMessage('error', 'サーバーに接続中です。しばらく待ってから再送してください。');
    return;
  }
  addMessage('user', text);
  setInputEnabled(false);
  ws.send(JSON.stringify({
    type: 'chat',
    text,
    mode: currentMode,
    project_path: projectPath,
    model: selectedModel,
    plan_file: currentMode === 'plan' ? currentPlanFile : null,
    context_files: contextFiles.map(f => f.path),
  }));
}

function sendText() {
  const el = document.getElementById('text-input');
  send(el.value);
  el.value = '';
  autoResize(el);
}

function resetSession() {
  if (!wsReady) {
    addMessage('error', 'サーバーに接続中です。しばらく待ってから再試行してください。');
    return;
  }
  document.getElementById('messages').innerHTML = '';
  ws.send(JSON.stringify({ type: 'reset' }));
}

function quickSend(text) {
  document.getElementById('text-input').value = text;
  sendText();
}

function switchProject() {
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  showWorkspacePicker();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setInputEnabled(enabled) {
  document.getElementById('send-btn').disabled = !enabled;
  document.getElementById('text-input').disabled = !enabled;
  // mic-btnはAI処理中もつなぎっぱなし（手動停止を可能にするため無効化しない）
}

// ---- 音声入力 ----
let recognition = null;
let isListening = false;
let isProcessing = false; // AI処理中はtrue（マイクはつなぎっぱなし）

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = 'ja-JP';
  r.continuous = true; // マイクをつなぎっぱなし
  r.interimResults = true;

  let interim = '';

  r.onresult = (e) => {
    if (isProcessing) return; // AI処理中は音声入力を無視
    interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('text-input').value = final || interim;
    autoResize(document.getElementById('text-input'));
    if (final) {
      const val = document.getElementById('text-input').value;
      if (val.trim()) {
        isProcessing = true;
        updateMicVisualProcessing();
        setTimeout(() => { sendText(); }, 300);
      }
    }
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech') return; // continuous時の無音は無視
    console.error(e.error);
    stopListeningFully();
  };

  r.onend = () => {
    // continuous=trueでもタイムアウト等でendが来た場合は再起動
    if (isListening) {
      try { r.start(); } catch(err) {}
    }
  };

  return r;
}

function toggleMic() {
  if (isListening) {
    stopListeningFully();
  } else {
    startListening();
  }
}

function startListening() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    const isHttp = location.protocol === 'http:' && location.hostname !== 'localhost';
    if (isHttp) {
      addMessage('error', '音声入力はHTTPSが必要です。\nテキスト入力を使うか、iOSのSafariをお試しください。');
    } else {
      addMessage('error', 'このブラウザは音声入力に対応していません。');
    }
    return;
  }

  unlockSpeech(); // iOS Safariのブロック解除
  document.getElementById('text-input').value = '';
  try {
    recognition.start();
  } catch(e) {
    addMessage('error', '音声認識を開始できませんでした: ' + e.message);
    return;
  }
  isListening = true;
  isProcessing = false;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-label').textContent = '話してください...';
}

function stopListeningFully() {
  if (recognition) recognition.stop();
  isListening = false;
  isProcessing = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-label').textContent = 'タップして話す';
}

function updateMicVisualProcessing() {
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-label').textContent = 'AI返答中...';
}

function updateMicVisualListening() {
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-label').textContent = '話してください...';
}


// ---- 読み上げON/OFF ----
function toggleTts() {
  unlockSpeech(); // iOS Safariのブロック解除
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('tts-btn');
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.classList.toggle('off', !ttsEnabled);
  if (!ttsEnabled) window.speechSynthesis.cancel();
}

// ---- リセット ----
function resetSession() {
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  showWorkspacePicker();
}

// ---- 初期化 ----
connect();
document.getElementById('model-select').value = selectedModel;

window.addEventListener('load', async () => {
  // モード状態を反映
  setModeButtons(currentMode);
  await loadProjects();
  goModeHome();
});
</script>
