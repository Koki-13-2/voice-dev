<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Dev</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --user-bubble: #1f6feb;
    --ai-bubble: #21262d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ヘッダー */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-weight: 600; font-size: 16px; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); }


  /* 会話エリア */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .message {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    word-break: break-word;
  }

  .message.user {
    background: var(--user-bubble);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .message.error {
    background: #2d1012;
    border: 1px solid var(--red);
    align-self: flex-start;
    color: var(--red);
  }

  /* Markdownスタイル */
  .message.ai h1,.message.ai h2,.message.ai h3 {
    font-size: 1em; font-weight: 700; margin: 8px 0 4px;
  }
  .message.ai p { margin: 4px 0; }
  .message.ai ul,.message.ai ol { padding-left: 18px; margin: 4px 0; }
  .message.ai li { margin: 2px 0; }
  .message.ai code {
    background: #0d1117; border-radius: 4px;
    padding: 1px 5px; font-size: 13px; font-family: monospace;
  }
  .message.ai pre {
    background: #0d1117; border-radius: 6px;
    padding: 10px; overflow-x: auto; margin: 6px 0;
  }
  .message.ai pre code { background: none; padding: 0; }
  .message.ai strong { color: #e6edf3; }
  .message.ai a { color: var(--accent); }

  /* ツール実行カード */
  .tool-card {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
    font-size: 13px;
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #161b22;
    border-bottom: 1px solid var(--border);
    color: var(--yellow);
    font-family: monospace;
  }

  .tool-result {
    padding: 8px 10px;
    font-family: monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 120px;
    overflow-y: auto;
  }

  /* 思考中アニメ */
  .thinking {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 14px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    animation: thinkingPulse 2s ease-in-out infinite;
  }

  .thinking-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-shrink: 0;
  }

  .thinking span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  .thinking-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .thinking-status {
    font-size: 13px;
    color: var(--text);
  }

  .thinking-timer {
    font-size: 11px;
    color: var(--muted);
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes thinkingPulse {
    0%, 100% { border-color: var(--border); box-shadow: none; }
    50% { border-color: var(--accent); box-shadow: 0 0 6px rgba(99,179,237,0.3); }
  }

  /* 入力エリア */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .text-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #text-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 15px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    font-family: inherit;
    line-height: 1.4;
  }

  #text-input:focus { border-color: var(--accent); }

  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 42px; height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    transition: background 0.2s;
  }

  #send-btn:active { background: #1f6feb; }
  #send-btn:disabled { background: var(--border); cursor: default; }

  /* マイクボタン */
  #mic-btn {
    width: 100%;
    height: 56px;
    border-radius: 12px;
    border: none;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--text);
  }

  #mic-btn.listening {
    background: #2d1012;
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
  }

  #mic-label { font-size: 15px; }

  /* コントロール */
  #model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 12px;
    cursor: pointer;
    max-width: 110px;
  }

  #reset-btn, #tts-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  #tts-btn.off { opacity: 0.4; }

  /* ===== プロジェクト選択 ===== */
  .project-picker {
    align-self: stretch;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 8px 0;
  }

  .picker-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* Step1: ワークスペース選択 */
  .workspace-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .workspace-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 22px 16px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .workspace-btn:hover  { border-color: var(--accent); }
  .workspace-btn:active { background: var(--surface2); }
  .workspace-btn .ws-icon { font-size: 28px; }
  .workspace-btn .ws-icon-img {
    width: 48px; height: 48px;
    border-radius: 10px;
    object-fit: cover;
  }
  .picker-back .ws-icon-img {
    width: 16px; height: 16px;
    border-radius: 3px;
    object-fit: cover;
    vertical-align: middle;
  }

  /* Step2: プロジェクト選択 */
  .picker-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .project-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 14px 16px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .project-btn:hover  { border-color: var(--accent); }
  .project-btn:active { background: var(--surface2); }
  .project-btn .proj-icon { font-size: 20px; flex-shrink: 0; }

  .new-proj-btn {
    border-style: dashed;
    color: var(--muted);
  }
  .new-proj-btn:hover { color: var(--text); border-color: var(--accent); }

  .new-proj-form {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .new-proj-form input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 11px 14px;
    font-size: 14px;
    outline: none;
  }

  .new-proj-form input:focus { border-color: var(--accent); }

  .btn-create-proj {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 11px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ===== 企画モード ===== */
  .plan-screen {
    align-self: stretch;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .plan-screen-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .plan-screen-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .btn-new-file {
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .plan-folder-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* フォルダヘッダー（折りたたみ可） */
  .plan-folder-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #1c2128;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }
  .plan-folder-header:hover { background: #212830; }

  .plan-folder-header-left {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 0;
    flex: 1;
  }

  .plan-folder-toggle { font-size: 9px; color: var(--muted); flex-shrink: 0; }

  .plan-folder-add-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    padding: 3px 10px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 700;
    flex-shrink: 0;
  }
  .plan-folder-add-btn:hover { border-color: var(--yellow); color: var(--yellow); }

  .plan-folder-body.collapsed { display: none; }

  /* ネストされたフォルダグループ */
  .plan-folder-nested {
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
    border-top: 1px solid var(--border);
  }
  .plan-folder-nested > .plan-folder-header {
    background: #161b22;
  }
  .plan-folder-nested > .plan-folder-header:hover {
    background: #1a2230;
  }

  .plan-file-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .plan-file-row:last-child { border-bottom: none; }

  .plan-file-name {
    font-size: 13px;
    color: var(--text);
    min-width: 0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .plan-file-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .plan-action-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 5px 11px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .plan-action-btn:hover { border-color: var(--accent); color: var(--text); }

  .plan-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .plan-folder-empty {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  /* 新規ファイルフォーム */
  .new-file-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-self: stretch;
  }

  .new-file-form .form-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .new-file-form input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 14px;
    outline: none;
    width: 100%;
    box-sizing: border-box;
  }

  .new-file-form input:focus { border-color: var(--accent); }

  .new-file-form .form-actions { display: flex; gap: 8px; }

  .new-file-form .btn-create {
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
  }

  .new-file-form .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 9px 16px;
    font-size: 13px;
    cursor: pointer;
  }

  /* フォルダチップ */
  .folder-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .folder-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .folder-chip:hover { border-color: var(--accent); color: var(--text); }
  .folder-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .folder-chip.new-folder-chip { border-style: dashed; color: var(--yellow); border-color: var(--yellow); }
  .folder-chip.new-folder-chip:hover { background: rgba(210,153,34,0.1); }
  .folder-chip.new-folder-chip.selected { background: rgba(210,153,34,0.15); border-style: solid; }

  /* カスタムフォルダ入力 */
  .custom-folder-area {
    margin-top: 6px;
    display: none;
  }
  .custom-folder-area.visible { display: block; }

  /* パスプレビュー */
  .plan-path-preview {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 10px;
    font-family: monospace;
    margin-top: 8px;
    word-break: break-all;
  }
  .plan-path-preview .path-highlight { color: var(--accent); }

  /* テンプレートチップ */
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .template-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
  }
  .template-chip:hover { border-color: var(--accent); color: var(--text); }
  .template-chip.selected { background: #0d2a1a; color: var(--green); border-color: var(--green); }

  /* 選択中ファイルバー */
  .plan-file-bar {
    background: #1c1f2b;
    border: 1px solid #3d3d1f;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--yellow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .plan-file-bar button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 0 2px;
  }

  /* ===== モード切替 ===== */
  .mode-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    background: none;
    border: none;
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--surface);
    color: var(--text);
  }

  .mode-btn.dev.active  { color: var(--accent); }
  .mode-btn.plan.active { color: var(--yellow); }
  .mode-btn.idea.active { color: #bc8cff; }
  .mode-btn.propose.active { color: #f0883e; }

  /* ===== アイデアDB ===== */
  .idea-card { background: var(--surface); border: 1px solid #30363d; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; }
  .idea-card-top { display: flex; align-items: center; gap: 8px; }
  .idea-title { font-weight: 700; font-size: 14px; }
  .idea-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .idea-status { font-size: 11px; border-radius: 10px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0; }
  .idea-status.s0 { background: #21262d; color: #8b949e; }
  .idea-status.s1 { background: #0d2a1a; color: #3fb950; }
  .idea-status.s2 { background: #1a2035; color: #58a6ff; }
  .star-btn { background: none; border: none; font-size: 18px; cursor: pointer;
    opacity: .3; padding: 2px; flex-shrink: 0; color: #e3b341; transition: opacity .15s; }
  .star-btn.on { opacity: 1; }
  .idea-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .idea-hint { font-size: 12px; color: var(--muted); padding: 4px 0 14px; line-height: 1.6; }

  /* ===== 提案モード ===== */
  .proposal-row { display: flex; gap: 10px; align-items: flex-start; background: var(--surface);
    border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .proposal-row.done { opacity: .5; }
  .proposal-row.done .proposal-title { text-decoration: line-through; }
  .proposal-row input[type=checkbox] { width: 18px; height: 18px; margin-top: 2px;
    accent-color: #f0883e; flex-shrink: 0; cursor: pointer; }
  .proposal-angle { font-size: 11px; color: #f0883e; }
  .proposal-title { font-size: 13px; font-weight: 600; }
  .proposal-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .proposal-done-at { font-size: 11px; color: #3fb950; margin-top: 2px; }

  /* ===== 自動開発バー ===== */
  .autodev-bar { background: #161006; border: 1px solid #6a4a00; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center;
    gap: 10px; flex-wrap: wrap; }
  .autodev-toggle { width: 44px; height: 24px; border-radius: 12px; background: #30363d;
    border: none; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .autodev-toggle.on { background: #238636; }
  .autodev-toggle::after { content: ''; position: absolute; top: 3px; left: 3px;

  .autodev-info { font-size: 12px; color: var(--muted); flex: 1; min-width: 140px; line-height: 1.5; }

  /* ===== 秘密情報モーダル ===== */
  .secret-input { flex: 1; min-width: 0; background: #0d1117; border: 1px solid #30363d;

  /* ===== トースト通知 ===== */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);

    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red);   }
  .toast.info    { border-color: var(--accent); color: var(--accent); }

  @keyframes toastSlide {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
  }

  /* ===== 検索バー ===== */
  .plan-search-row {
    position: relative;
  }
  .plan-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);

  .plan-search {

  /* ===== ファイル行: 情報 ===== */

    min-width: 0;
    flex: 1;

  /* ===== フォルダカウントバッジ ===== */

  /* ===== 削除ボタン ===== */
  .plan-action-btn.danger { color: var(--red); }

    border-color: var(--red);
    color: var(--red);

  }

  /* ===== ボタンローディング ===== */

    opacity: 0.6;
    cursor: not-allowed !important;

  }

  /* ===== 選択肢ボタン ===== */
  .choices-block {
    align-self: flex-start;

  }

  .choice-btn {
    background: var(--surface);
    border: 1px solid var(--accent);

    font-size: 13px;

  .ctx-chip {

  /* ===== ファイルピッカーオーバーレイ ===== */
  .fp-overlay {

  .fp-header {

<body>

<!-- ファイルピッカーモーダル -->
<div id="file-picker-overlay" class="fp-overlay" style="display:none" onclick="fpClickOverlay(event)">
  <div class="fp-sheet">

<!-- 秘密情報（環境変数・接続情報）モーダル -->

  <div class="fp-sheet">

<header>

      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

<script>
// ---- モード管理 ----
let currentMode = localStorage.getItem('mode') || 'dev'; // 'idea' | 'dev' | 'plan' | 'propose'

function setModeButtons(mode) {
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.classList.contains(mode));
  });
}

function switchMode(mode) {
  currentMode = mode;
  localStorage.setItem('mode', mode);
  setModeButtons(mode);

  // セッションリセットして初期画面へ
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  goModeHome();
}

function goModeHome() {
  if (currentMode === 'idea') {
    showIdeaScreen();
  } else {
    showWorkspacePicker();
  }
}

// ---- 設定 ----
const HOST = location.host;
let selectedModel = localStorage.getItem('selectedModel') || 'claude-sonnet-4-6';

function saveModel() {
  selectedModel = document.getElementById('model-select').value;
  localStorage.setItem('selectedModel', selectedModel);
}

function generateId() {
  try { return crypto.randomUUID(); } catch(e) {}
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
const SESSION_ID = (() => {
  // localStorage を使用: ページリロード・タブ再開後も同じセッションIDを維持し、
  // 実行中タスクへの再接続を可能にする
  let id = sessionStorage.getItem('sessionId');
  if (!id) {
    id = localStorage.getItem('sessionId') || generateId();
    sessionStorage.setItem('sessionId', id);
    localStorage.setItem('sessionId', id);
  }
  return id;
})();
let projectPath = localStorage.getItem('projectPath') || '';

// ---- プロジェクト選択（2段階） ----
let _projectsCache = null;

async function loadProjects() {
  if (_projectsCache) return _projectsCache;
  try {
    _projectsCache = await fetch('/api/projects').then(r => r.json());
  } catch(e) {
    _projectsCache = [];
  }
  return _projectsCache;
}

const WS_ICONS = { 'private-dev': '🛠' };
const WS_IMG_CACHE = {};

async function getWsIcon(name) {
  if (WS_ICONS[name]) return `<span class="ws-icon">${WS_ICONS[name]}</span>`;
  if (WS_IMG_CACHE[name] !== undefined) return WS_IMG_CACHE[name];
  const res = await fetch(`/api/workspace-icon/${name}`, { method: 'HEAD' });
  const html = res.ok
    ? `<img class="ws-icon-img" src="/api/workspace-icon/${name}" alt="${name}">`
    : `<span class="ws-icon">📂</span>`;
  WS_IMG_CACHE[name] = html;
  return html;
}
const PROJ_ICONS = {
  'voice-dev': '🎙', 'stock-visualizer': '📈',
  'chart_app': '📊', 'slide_app': '🖥', 'util_aiapi': '🔧',
  'claw-code': '🦀',
};

const FOLDER_ICONS = {
  features: '⚡', screens: '🖥', api: '🔌',
  data: '🗄', flows: '🔄',
};

function renderFileRow(f) {
  return `<div class="plan-file-row">
    <div class="plan-file-info">
      <span class="plan-file-name">📄 ${escHtml(f.name)}</span>
      ${f.rel_path && f.rel_path !== f.name + '.md' ? `<span class="plan-file-meta">${escHtml(f.rel_path)}</span>` : ''}
    </div>
    <div class="plan-file-actions">
      <a class="plan-action-btn" href="/md-view?path=${encodeURIComponent(f.path)}" target="_blank">👁 閲覧</a>
      <button class="plan-action-btn" onclick="startPlanChat('${escAttr(f.path)}','${escAttr(f.name)}')">💬 チャット</button>
      <button class="plan-action-btn danger" onclick="deletePlanFile('${escAttr(f.path)}','${escAttr(f.name)}')" title="削除">🗑</button>
    </div>
  </div>`;
}

function setPicker(html) {
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'project-picker';
  el.id = 'project-picker';
  el.innerHTML = html;
  messagesEl.appendChild(el);
}

// Step1: ワークスペース選択
async function showWorkspacePicker() {
  const workspaces = await loadProjects();
  const icons = await Promise.all(workspaces.map(ws => getWsIcon(ws.workspace)));
  const btns = workspaces.map((ws, i) =>
    `<button class="workspace-btn" onclick="showProjectPicker('${ws.workspace}')">
      ${icons[i]}${ws.workspace}
    </button>`
  ).join('');
  setPicker(`
    <div class="picker-title">ワークスペースを選択</div>
    <div class="workspace-grid">${btns}</div>`);
  setInputEnabled(false);
}

// Step2: プロジェクト選択
async function showProjectPicker(wsName) {
  const workspaces = await loadProjects();
  const ws = workspaces.find(w => w.workspace === wsName);
  if (!ws) return;
  const iconHtml = await getWsIcon(wsName);
  const btns = ws.projects.map(p => {
    const picon = PROJ_ICONS[p.name] || '📁';
    return `<button class="project-btn" onclick="selectProject('${p.path}','${p.name}')">
      <span class="proj-icon">${picon}</span>${p.name}
    </button>`;
  }).join('');
  setPicker(`
    <button class="picker-back" onclick="showWorkspacePicker()">← ${iconHtml} ${wsName}</button>
    <div class="picker-title">プロジェクトを選択</div>
    <div class="project-list">
      ${btns}

async function createProject(wsName) {
  const name = document.getElementById('new-proj-name')?.value.trim();
  if (!name) return;
  const res = await fetch('/api/projects/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },

  }).then(r => r.json());

function selectProject(path, name) {

function removeContextFile(path) {

let fpAllFiles = [];
let fpSelectedPaths = new Set();
let fpCurrentQuery = '';

async function openFilePicker() {

function closeFilePicker() {

function fpClickOverlay(e) {

function filterPickerFiles(q) {
  fpCurrentQuery = q.trim().toLowerCase();
  const filtered = fpCurrentQuery
    ? fpAllFiles.filter(f => f.rel_path.toLowerCase().includes(fpCurrentQuery) || f.name.toLowerCase().includes(fpCurrentQuery))

function renderPickerList(files) {
  const list = document.getElementById('fp-list');
  if (!files.length) {
    list.innerHTML = '<div class="fp-empty">ファイルが見つかりません</div>';
    return;
  }

  // フォルダでグループ化
  const grouped = {};
  for (const f of files) {
    const folder = f.folder || '(ルート)';
    if (!grouped[folder]) grouped[folder] = [];
    grouped[folder].push(f);
  }

  let html = '';
  for (const [folder, ffiles] of Object.entries(grouped).sort()) {
    html += `<div class="fp-folder-header">📂 ${escHtml(folder)}</div>`;
    for (const f of ffiles) {
      const sel = fpSelectedPaths.has(f.path);
      html += `<div class="fp-file-row${sel ? ' selected' : ''}" onclick="togglePickerFile('${escAttr(f.path)}','${escAttr(f.name)}',this)">
        <div class="fp-file-check">${sel ? '✓' : ''}</div>
        <div class="fp-file-info">
          <div class="fp-file-name">${escHtml(f.name)}</div>
          ${f.folder ? `<div class="fp-file-path">${escHtml(f.rel_path)}</div>` : ''}
        </div>
      </div>`;
    }
  }
  list.innerHTML = html;
}

function togglePickerFile(path, name, rowEl) {
  if (fpSelectedPaths.has(path)) {
    fpSelectedPaths.delete(path);
    rowEl.classList.remove('selected');
    rowEl.querySelector('.fp-file-check').textContent = '';
  } else {
    fpSelectedPaths.add(path);

  updateFpFooter();
}

function updateFpFooter() {
  const count = fpSelectedPaths.size;
  document.getElementById('fp-count-label').textContent = count > 0 ? `${count}件選択中` : '選択なし';

  // 既存のcontextFilesを更新（選択されていないものは削除、新しいものを追加）
  const fileMap = new Map(fpAllFiles.map(f => [f.path, f]));

async function showPlanScreen(projPath, projName) {

function togglePlanFolder(key, bodyId, headerEl) {

// ── フォルダツリー構築 ──────────────────────────────

function buildFolderTree(files, folders) {
  const root = { name: '', path: '', children: {}, files: [] };

  // フォルダノードを確保（空フォルダも含む）
  for (const folder of folders) {
    const parts = folder.split('/').filter(Boolean);
    let node = root;
    let cur = '';
    for (const part of parts) {
      cur = cur ? `${cur}/${part}` : part;
      if (!node.children[part]) {
        node.children[part] = { name: part, path: cur, children: {}, files: [] };
      }
      node = node.children[part];
    }
  }

  // ファイルをツリーに配置
  for (const f of files) {
    if (!f.folder) {
      root.files.push(f);
    } else {
      const parts = f.folder.split('/').filter(Boolean);
      let node = root;
      let cur = '';
      for (const part of parts) {
        cur = cur ? `${cur}/${part}` : part;
        if (!node.children[part]) {
          node.children[part] = { name: part, path: cur, children: {}, files: [] };
        }
        node = node.children[part];
      }
      node.files.push(f);
    }
  }

  return root;
}

function countFolderFiles(node) {
  let count = node.files.length;
  for (const child of Object.values(node.children)) count += countFolderFiles(child);
  return count;
}

function renderFolderGroup(node, depth) {
  const folder = node.path;
  const isCollapsed = planFolderCollapsed[folder] === true;
  const bodyId = 'pfb-' + btoa(encodeURIComponent(folder)).replace(/[^a-zA-Z0-9]/g, '_');
  const topFolder = folder.split('/')[0];
  const folderIcon = FOLDER_ICONS[topFolder] || '📂';
  const totalFiles = countFolderFiles(node);
  const isNested = depth > 1;
  const paddingLeft = 12 + (depth - 1) * 16;

  const childEntries = Object.values(node.children).sort((a, b) => a.name.localeCompare(b.name));

  let html = `<div class="plan-folder-group${isNested ? ' plan-folder-nested' : ''}">
      <div class="plan-folder-header" style="padding-left:${paddingLeft}px" onclick="togglePlanFolder('${escAttr(folder)}','${bodyId}',this)">
        <div class="plan-folder-header-left">
          <span class="plan-folder-toggle">${isCollapsed ? '▶' : '▼'}</span>
          <span>${folderIcon} ${escHtml(node.name)}</span>
          <span class="plan-folder-count">${totalFiles}</span>
        </div>
        <button class="plan-folder-add-btn" onclick="event.stopPropagation();showNewFileForm('${escAttr(folder)}')">＋</button>
      </div>
      <div class="plan-folder-body${isCollapsed ? ' collapsed' : ''}" id="${bodyId}">`;

  // 子フォルダを再帰的にレンダリング
  for (const child of childEntries) {
    html += renderFolderGroup(child, depth + 1);
  }

  // ファイル
  if (node.files.length === 0 && childEntries.length === 0) {
    html += `<div class="plan-folder-empty">ファイルなし — ＋ で追加</div>`;
  }
  for (const f of node.files) html += renderFileRow(f);

  html += `</div></div>`;
  return html;
}

function selectPlanFolder(folder) {
  newFileSelectedFolder = folder;
  document.querySelectorAll('.folder-chips .folder-chip').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.folder-chips .folder-chip').forEach(el => {
    const isRoot = folder === '' && el.textContent.includes('ルート');
    const isMatch = folder !== '' && el.textContent.trim() === folder;
    if (isRoot || isMatch) el.classList.add('selected');
  });
  document.getElementById('nf-custom-area')?.classList.remove('visible');
  document.getElementById('nf-custom-toggle')?.classList.remove('selected');
  // テンプレートを自動提案
  const suggested = PLAN_KNOWN_TEMPLATES.find(t => folder.includes(t)) || newFileSelectedTemplate;
  if (suggested !== newFileSelectedTemplate) selectPlanTemplate(suggested);
  updatePlanPathPreview();
}

function toggleCustomFolder() {
  const area = document.getElementById('nf-custom-area');
  const btn = document.getElementById('nf-custom-toggle');
  const visible = area?.classList.toggle('visible');
  btn?.classList.toggle('selected', visible);
  if (visible) {
    document.getElementById('nf-custom-folder')?.focus();
  } else {
    newFileSelectedFolder = '';
    updatePlanPathPreview();
  }
}

function onCustomFolderInput(val) {
  newFileSelectedFolder = val.trim();
  document.querySelectorAll('.folder-chips .folder-chip:not(.new-folder-chip)').forEach(el => el.classList.remove('selected'));
  updatePlanPathPreview();
}

function selectPlanTemplate(key) {
  newFileSelectedTemplate = key;
  document.querySelectorAll('#nf-template-chips .template-chip').forEach((el, i) => {
    const keys = ['features', 'screens', 'api', 'data', 'flows', ''];
    el.classList.toggle('selected', keys[i] === key);
  });
}

function updatePlanPathPreview() {
  const raw = document.getElementById('nf-name')?.value.trim() || '';
  const fname = (raw || '...').replace(/\.md$/, '') + '.md';
  const folderPart = newFileSelectedFolder ? ' / ' + newFileSelectedFolder : '';
  const fp = document.getElementById('nf-preview-folder');
  const fn = document.getElementById('nf-preview-file');
  if (fp) fp.textContent = folderPart;
  if (fn) fn.textContent = fname;
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

async function createPlanFile() {
  const filename = document.getElementById('nf-name').value.trim();
  if (!filename) { showToast('ファイル名を入力してください', 'error'); return; }

  const btn = document.querySelector('#new-file-form .btn-create');
  if (btn) { btn.disabled = true; btn.textContent = '作成中...'; btn.classList.add('btn-loading'); }

  try {
    const res = await fetch('/api/plan/create-file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        project_path: currentPlanProjectPath,
        folder: newFileSelectedFolder,
        filename,
        template_category: newFileSelectedTemplate,
      }),
    }).then(r => r.json());

    if (res.error) throw new Error(res.error);
    showToast(`「${res.name}」を作成しました`, 'success');
    startPlanChat(res.path, res.name);
  } catch(e) {
    showToast('ファイルの作成に失敗しました: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '作成してチャット開始'; btn.classList.remove('btn-loading'); }
  }
}

function showToast(msg, type = 'info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; }, 2500);
  setTimeout(() => toast.remove(), 2800);
}

async function deletePlanFile(filePath, fileName) {
  if (!confirm(`「${fileName}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  try {
    const res = await fetch(`/api/plan/file?path=${encodeURIComponent(filePath)}`, {
      method: 'DELETE',
    }).then(r => r.json());
    if (res.error) throw new Error(res.error);
    showToast(`「${fileName}」を削除しました`, 'success');
    await showPlanScreen(currentPlanProjectPath, currentPlanProjectName);
  } catch(e) {
    showToast('削除に失敗しました: ' + e.message, 'error');
  }
}

function filterPlanFiles(query) {
  const q = query.toLowerCase().trim();
  let anyVisible = false;
  document.querySelectorAll('#plan-screen .plan-file-row').forEach(row => {
    const name = row.querySelector('.plan-file-name')?.textContent.toLowerCase() || '';
    const show = !q || name.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) anyVisible = true;
  });
  // フォルダ全体の表示制御（検索時に一致なしは非表示）
  document.querySelectorAll('#plan-screen .plan-folder-group').forEach(group => {
    if (!q) { group.style.display = ''; return; }
    const visible = [...group.querySelectorAll('.plan-file-row')].some(r => r.style.display !== 'none');
    group.style.display = visible ? '' : 'none';
  });
  // 結果なし表示
  let noResult = document.getElementById('plan-no-results');
  if (q && !anyVisible) {
    if (!noResult) {
      noResult = document.createElement('div');
      noResult.id = 'plan-no-results';
      noResult.className = 'plan-no-results';
      document.getElementById('plan-screen').appendChild(noResult);
    }
    noResult.textContent = `「${query}」に一致するファイルはありません`;
  } else if (noResult) {
    noResult.remove();
  }
}

// ---- WebSocket ----
let ws = null;
let wsReady = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${HOST}/ws/${SESSION_ID}`);

  ws.onopen = () => {
    wsReady = true;
    document.getElementById('status-dot').classList.add('connected');
  };

  ws.onclose = () => {
    wsReady = false;
    document.getElementById('status-dot').classList.remove('connected');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
}

// ---- サーバーメッセージ処理 ----
let currentAiDiv = null;
let thinkingDiv = null;
let thinkingTimerInterval = null;
let thinkingStartTime = null;

const THINKING_STAGES = [
  { sec: 0,  text: '考え中...' },
  { sec: 6,  text: '処理中...' },
  { sec: 12, text: '少し時間がかかっています...' },
  { sec: 25, text: 'もうすぐです...' },
  { sec: 40, text: 'まだ動いています、お待ちください...' },
];

function handleServerMessage(msg) {
  if (msg.type === 'thinking') {
    removeThinking();
    thinkingDiv = document.createElement('div');
    thinkingDiv.className = 'thinking';
    thinkingDiv.innerHTML = `
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <div class="thinking-info">
        <div class="thinking-status" id="thinking-status">考え中...</div>
        <div class="thinking-timer" id="thinking-timer">0秒経過</div>
      </div>`;
    document.getElementById('messages').appendChild(thinkingDiv);
    scrollBottom();
    currentAiDiv = null;

    setInputEnabled(false);
    thinkingStartTime = Date.now();
    thinkingTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - thinkingStartTime) / 1000);
      const timerEl = document.getElementById('thinking-timer');
      const statusEl = document.getElementById('thinking-status');
      if (timerEl) timerEl.textContent = elapsed + '秒経過';
      if (statusEl) {
        const stage = [...THINKING_STAGES].reverse().find(s => elapsed >= s.sec);
        if (stage) statusEl.textContent = stage.text;
      }
    }, 1000);

    return;
  }

  removeThinking();

  if (msg.type === 'text') {
    if (!currentAiDiv) {
      currentAiDiv = addMessage('ai', '');
      currentAiDiv._raw = '';
      currentAiDiv._renderPending = false;
    }
    currentAiDiv._raw += msg.content;
    if (!currentAiDiv._renderPending) {
      currentAiDiv._renderPending = true;
      const div = currentAiDiv;
      requestAnimationFrame(() => {
        div._renderPending = false;
        // ストリーム中は :::choices ブロックを一時的に非表示
        const { cleanText } = parseChoices(div._raw);
        div.innerHTML = marked.parse(cleanText || div._raw);
        scrollBottom();
      });
    }
  }

  if (msg.type === 'tool_start') {
    currentAiDiv = null;
    const card = document.createElement('div');
    card.className = 'message ai';
    card.style.padding = '0';
    card.innerHTML = `
      <div class="tool-card">
        <div class="tool-header">⚙ ${escHtml(msg.tool)}<span style="color:var(--muted);font-size:11px">${escHtml(JSON.stringify(msg.input))}</span></div>
        <div class="tool-result" id="tr-${escHtml(msg.tool)}-${Date.now()}">実行中...</div>
      </div>`;
    document.getElementById('messages').appendChild(card);
    card._resultEl = card.querySelector('.tool-result');
    card._toolName = msg.tool;
    scrollBottom();
    // 最後のtool cardを記録
    window._lastToolCard = card;
  }

  if (msg.type === 'tool_end' && window._lastToolCard) {
    window._lastToolCard._resultEl.textContent = msg.result;
    scrollBottom();
  }

  if (msg.type === 'idea_saved') {
    showToast(`要件定義書「${msg.idea.title}」を保存しました`, 'success');
    currentAiDiv = null;
    const div = document.createElement('div');
    div.className = 'message ai';
    div.innerHTML = `💡 <strong>${escHtml(msg.idea.title)}</strong> をアイデアDBに保存しました。
      <div class="idea-actions">
        <a class="plan-action-btn" href="/md-view?path=${encodeURIComponent(msg.idea.path)}" target="_blank">👁 閲覧</a>
        <button class="plan-action-btn" onclick="showIdeaScreen()">📚 アイデア一覧へ</button>
      </div>`;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  }

  if (msg.type === 'proposals_updated') {
    showToast(msg.added > 0 ? `${msg.added}件の提案を追加しました` : '新しい提案はありませんでした', 'success');
    if (currentMode === 'propose' && projectPath === msg.app_path) {
      showProposalScreen(projectPath, projectPath.split('/').pop());
    }
  }

  if (msg.type === 'error') {
    addMessage('error', '⚠ ' + msg.content);
    setInputEnabled(true);
    scrollBottom();
  }

  if (msg.type === 'done') {
    if (currentAiDiv?._raw) {
      // :::choices ブロックを抽出してから最終レンダリング
      const { cleanText, choices } = parseChoices(currentAiDiv._raw);
      currentAiDiv.innerHTML = marked.parse(cleanText);
      scrollBottom();
      speak(cleanText);
      if (choices.length > 0) {
        renderChoiceButtons(choices);
      }
    }
    setInputEnabled(true);
    currentAiDiv = null;
    scrollBottom();
    if (isListening) {
      isProcessing = false;
      updateMicVisualListening();
    }
  }
}

function parseChoices(text) {
  const choicesRegex = /:::choices\s*\n([\s\S]*?)\n:::/g;
  const choices = [];
  const cleanText = text.replace(choicesRegex, (match, body) => {
    body.split('\n').forEach(line => {
      const item = line.replace(/^[-*]\s*/, '').trim();
      if (item) choices.push(item);
    });
    return '';
  }).trim();
  return { cleanText, choices };
}

function renderChoiceButtons(choices) {
  const block = document.createElement('div');
  block.className = 'choices-block';
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      // 全ボタンを無効化
      block.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
      send(choice);
    };
    block.appendChild(btn);
  });
  document.getElementById('messages').appendChild(block);
  scrollBottom();
}

function removeThinking() {
  if (thinkingTimerInterval) { clearInterval(thinkingTimerInterval); thinkingTimerInterval = null; }
  if (thinkingDiv) { thinkingDiv.remove(); thinkingDiv = null; }
}

// ---- TTS読み上げ ----
let ttsEnabled = true;
let speechUnlocked = false;

// iOS Safariはユーザー操作外からのspeakをブロックするため、
// 最初のユーザー操作で無音utteranceを発行してアンロックする
function unlockSpeech() {
  if (speechUnlocked || !window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance('');
  utt.volume = 0;
  window.speechSynthesis.speak(utt);
  speechUnlocked = true;
}

// AI応答から最後の散文段落だけを抽出する
function extractLastParagraph(text) {
  // コードブロック・インラインコード除去
  const noCode = text.replace(/```[\s\S]*?```/g, '').replace(/`[^`]+`/g, '');
  // Markdown記号・箇条書き除去
  const plain = noCode.replace(/#{1,6}\s*/g, '').replace(/[*_~>]/g, '')
    .replace(/^\s*[-•*]\s*/gm, '').replace(/^\s*\d+\.\s*/gm, '').trim();
  // 空行で段落分割し、10文字以上の段落だけ取得
  const paragraphs = plain.split(/\n{2,}/).map(p => p.replace(/\n/g, ' ').trim()).filter(p => p.length >= 10);
  return paragraphs[paragraphs.length - 1] || '';
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const lastParagraph = extractLastParagraph(text);
  if (!lastParagraph) return;
  const utt = new SpeechSynthesisUtterance(lastParagraph);
  utt.lang = 'ja-JP';
  utt.rate = 1.1;
  window.speechSynthesis.speak(utt);
}

// ---- メッセージ追加 ----
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'ai') {
    div.innerHTML = marked.parse(text);
  } else {
    div.innerText = text;
  }
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- 送信 ----
function send(text) {
  if (!text.trim()) return;
  // 要件定義モードはプロジェクト選択不要（アイデアDBに直接保存）
  if (currentMode !== 'idea' && !projectPath) {
    showWorkspacePicker();
    return;
  }
  if (!wsReady) {
    addMessage('error', 'サーバーに接続中です。しばらく待ってから再送してください。');
    return;
  }
  addMessage('user', text);
  setInputEnabled(false);
  ws.send(JSON.stringify({
    type: 'chat',
    text,
    mode: currentMode,
    project_path: projectPath,
    model: selectedModel,
    plan_file: currentMode === 'plan' ? currentPlanFile : null,
    context_files: contextFiles.map(f => f.path),
  }));
}

function sendText() {
  const el = document.getElementById('text-input');
  send(el.value);
  el.value = '';
  autoResize(el);
}

function resetSession() {
  if (!wsReady) {
    addMessage('error', 'サーバーに接続中です。しばらく待ってから再試行してください。');
    return;
  }
  document.getElementById('messages').innerHTML = '';
  ws.send(JSON.stringify({ type: 'reset' }));
}

function quickSend(text) {
  document.getElementById('text-input').value = text;
  sendText();
}

function switchProject() {
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  showWorkspacePicker();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setInputEnabled(enabled) {
  document.getElementById('send-btn').disabled = !enabled;
  document.getElementById('text-input').disabled = !enabled;
  // mic-btnはAI処理中もつなぎっぱなし（手動停止を可能にするため無効化しない）
}

// ---- 音声入力 ----
let recognition = null;
let isListening = false;
let isProcessing = false; // AI処理中はtrue（マイクはつなぎっぱなし）

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = 'ja-JP';
  r.continuous = true; // マイクをつなぎっぱなし
  r.interimResults = true;

  let interim = '';

  r.onresult = (e) => {
    if (isProcessing) return; // AI処理中は音声入力を無視
    interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('text-input').value = final || interim;
    autoResize(document.getElementById('text-input'));
    if (final) {
      const val = document.getElementById('text-input').value;
      if (val.trim()) {
        isProcessing = true;
        updateMicVisualProcessing();
        setTimeout(() => { sendText(); }, 300);
      }
    }
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech') return; // continuous時の無音は無視
    console.error(e.error);
    stopListeningFully();
  };

  r.onend = () => {
    // continuous=trueでもタイムアウト等でendが来た場合は再起動
    if (isListening) {
      try { r.start(); } catch(err) {}
    }
  };

  return r;
}

function toggleMic() {
  if (isListening) {
    stopListeningFully();
  } else {
    startListening();
  }
}

function startListening() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    const isHttp = location.protocol === 'http:' && location.hostname !== 'localhost';
    if (isHttp) {
      addMessage('error', '音声入力はHTTPSが必要です。\nテキスト入力を使うか、iOSのSafariをお試しください。');
    } else {
      addMessage('error', 'このブラウザは音声入力に対応していません。');
    }
    return;
  }

  unlockSpeech(); // iOS Safariのブロック解除
  document.getElementById('text-input').value = '';
  try {
    recognition.start();
  } catch(e) {
    addMessage('error', '音声認識を開始できませんでした: ' + e.message);
    return;
  }
  isListening = true;
  isProcessing = false;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-label').textContent = '話してください...';
}

function stopListeningFully() {
  if (recognition) recognition.stop();
  isListening = false;
  isProcessing = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-label').textContent = 'タップして話す';
}

function updateMicVisualProcessing() {
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-label').textContent = 'AI返答中...';
}

function updateMicVisualListening() {
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-label').textContent = '話してください...';
}


// ---- 読み上げON/OFF ----
function toggleTts() {
  unlockSpeech(); // iOS Safariのブロック解除
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('tts-btn');
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.classList.toggle('off', !ttsEnabled);
  if (!ttsEnabled) window.speechSynthesis.cancel();
}

// ---- リセット ----
function resetSession() {
  projectPath = '';
  currentPlanFile = null;
  currentPlanProjectPath = null;
  currentPlanProjectName = null;
  contextFiles = [];
  localStorage.removeItem('projectPath');
  renderContextChips();
  document.getElementById('proj-badge')?.style.setProperty('display', 'none');
  document.getElementById('quick-actions').style.display = 'none';
  if (wsReady) ws.send(JSON.stringify({ type: 'reset' }));
  showWorkspacePicker();
}

// ---- 初期化 ----
connect();
document.getElementById('model-select').value = selectedModel;

window.addEventListener('load', async () => {
  // モード状態を反映
  setModeButtons(currentMode);
  await loadProjects();
  goModeHome();
});
</script>
